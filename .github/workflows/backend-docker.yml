name: Backend — Build and Push Docker Image

on:
  push:
    branches: [master]
    paths:
      - backend/**
      - shared/**
      - package.json
      - pnpm-lock.yaml
  pull_request:
    branches: [master]
    paths:
      - backend/**
      - shared/**
      - package.json
      - pnpm-lock.yaml
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from backend/package.json
        id: version
        run: |
          echo "version=$(node -p "require('./backend/package.json').version")" >> $GITHUB_OUTPUT

      - name: Sync version to backend/config.yaml
        if: github.event_name != 'pull_request'
        run: |
          sed -i 's/^version: .*/version: "${{ steps.version.outputs.version }}"/' backend/config.yaml
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backend/config.yaml
          git diff --staged --quiet || git commit -m "chore: sync version to ${{ steps.version.outputs.version }} [skip ci]" && git push

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/abbondanzo/peloton-reservations:${{ steps.version.outputs.version }}
            ghcr.io/abbondanzo/peloton-reservations:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
